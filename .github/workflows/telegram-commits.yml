name: Telegram commit mirror

on:
  push:
    branches:
      - "**"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send push info to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
          COMPARE_URL: ${{ github.event.compare }}
        run: |
          sudo apt-get update >/dev/null 2>&1
          sudo apt-get install -y jq >/dev/null 2>&1

          COMMITS_TEXT=$(echo "$COMMITS_JSON" | jq -r '
            .[] | "• " + (.message | split("\n")[0]) + " — " + .author.name
          ' | head -20)

          TEXT="📦 <b>${REPO}</b>%0A🌿 Branch: <code>${BRANCH}</code>%0A👤 Pushed by: <b>${ACTOR}</b>%0A%0A<b>Commits:</b>%0A${COMMITS_TEXT}%0A%0A🔗 ${COMPARE_URL}"

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="$TEXT" \
            -d parse_mode="HTML" \
            --data-urlencode text="$TEXT"