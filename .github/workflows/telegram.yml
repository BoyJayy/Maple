name: Telegram Repo Feed

on:
  push:
  pull_request:
    types: [opened, reopened, synchronize, closed, ready_for_review]
  issues:
    types: [opened, reopened, closed, edited]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted, edited]
  pull_request_review_comment:
    types: [created]
  release:
    types: [published, prereleased]
  create:
  delete:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: read
  actions: read

jobs:
  telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Build Telegram message
        id: build
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          REF_NAME: ${{ github.ref_name }}

          TG_THREAD_PRS: ${{ secrets.TELEGRAM_THREAD_PRS }}
          TG_THREAD_PUSHES: ${{ secrets.TELEGRAM_THREAD_PUSHES }}
          TG_THREAD_ISSUES: ${{ secrets.TELEGRAM_THREAD_ISSUES }}
          TG_THREAD_REVIEWS: ${{ secrets.TELEGRAM_THREAD_REVIEWS }}
          TG_THREAD_RELEASES: ${{ secrets.TELEGRAM_THREAD_RELEASES }}
        run: |
          python3 << 'PY'
          import json
          import os
          import html

          event_name = os.environ.get("EVENT_NAME", "")
          event_path = os.environ["GITHUB_EVENT_PATH"]
          repository = os.environ.get("REPOSITORY", "")
          repository_url = os.environ.get("REPOSITORY_URL", "")
          actor = os.environ.get("ACTOR", "")
          sha = os.environ.get("SHA", "")
          ref_name = os.environ.get("REF_NAME", "")
          github_output = os.environ["GITHUB_OUTPUT"]

          THREADS = {
              "prs": os.environ.get("TG_THREAD_PRS", ""),
              "pushes": os.environ.get("TG_THREAD_PUSHES", ""),
              "issues": os.environ.get("TG_THREAD_ISSUES", ""),
              "reviews": os.environ.get("TG_THREAD_REVIEWS", ""),
              "releases": os.environ.get("TG_THREAD_RELEASES", ""),
          }

          with open(event_path, "r", encoding="utf-8") as f:
              event = json.load(f)

          def esc(x):
              return html.escape(str(x or ""))

          def short_sha(s):
              return (s or "")[:7]

          def trim(s, n=300):
              s = str(s or "").strip()
              if len(s) <= n:
                  return s
              return s[:n - 1] + "…"

          def join_lines(items):
              return "\n".join(i for i in items if i)

          msg = ""
          thread_id = ""

          if event_name == "push":
              commits = event.get("commits", [])
              compare = event.get("compare") or repository_url
              ref = event.get("ref", "")
              branch = ref.replace("refs/heads/", "").replace("refs/tags/", "")
              forced = event.get("forced", False)

              thread_id = THREADS["pushes"]

              commit_lines = []
              for c in commits[:5]:
                  commit_id = short_sha(c.get("id", ""))
                  message = trim((c.get("message") or "").split("\n")[0], 120)
                  author = c.get("author", {}).get("name", "unknown")
                  line = f"• <code>{esc(commit_id)}</code> {esc(message)} — <i>{esc(author)}</i>"
                  commit_lines.append(line)

              flags = []
              if forced:
                  flags.append("forced push")

              msg = join_lines([
                  "📤 <b>PUSH</b>",
                  f"📦 <b>{esc(repository)}</b>",
                  f"🌿 <code>{esc(branch or ref_name)}</code>",
                  f"👤 <b>{esc(actor)}</b>",
                  f"🔢 commits: <b>{len(commits)}</b>",
                  f"⚠️ {' | '.join(flags)}" if flags else "",
                  "",
                  "\n".join(commit_lines) if commit_lines else f"Last commit: <code>{esc(short_sha(sha))}</code>",
                  "",
                  f'🔗 <a href="{esc(compare)}">open compare</a>'
              ])

          elif event_name == "pull_request":
              pr = event.get("pull_request", {})
              action = event.get("action", "")
              number = pr.get("number", event.get("number", ""))
              title = pr.get("title", "")
              url = pr.get("html_url", repository_url)
              merged = pr.get("merged", False)
              base = pr.get("base", {}).get("ref", "")
              head = pr.get("head", {}).get("ref", "")
              changed_files = pr.get("changed_files", 0)
              commits_count = pr.get("commits", 0)

              thread_id = THREADS["prs"]

              icon = "🔀"
              label = f"PR {action.upper()}"

              if action == "closed" and merged:
                  icon = "✅"
                  label = "PR MERGED"
              elif action == "closed":
                  icon = "❌"
                  label = "PR CLOSED"
              elif action == "ready_for_review":
                  icon = "👀"
                  label = "PR READY FOR REVIEW"

              msg = join_lines([
                  f"{icon} <b>{esc(label)}</b>",
                  f"📦 <b>{esc(repository)}</b>",
                  f'#{number} <a href="{esc(url)}"><b>{esc(title)}</b></a>',
                  f"👤 <b>{esc(actor)}</b>",
                  f"🌿 <code>{esc(head)}</code> → <code>{esc(base)}</code>",
                  f"📊 files: {changed_files} | commits: {commits_count}"
              ])

          elif event_name == "issues":
              issue = event.get("issue", {})
              action = event.get("action", "")
              number = issue.get("number", event.get("number", ""))
              title = issue.get("title", "")
              url = issue.get("html_url", repository_url)
              state = issue.get("state", "")

              thread_id = THREADS["issues"]

              msg = join_lines([
                  f"📝 <b>ISSUE {esc(action.upper())}</b>",
                  f"📦 <b>{esc(repository)}</b>",
                  f'#{number} <a href="{esc(url)}"><b>{esc(title)}</b></a>',
                  f"👤 <b>{esc(actor)}</b>",
                  f"📌 state: <b>{esc(state)}</b>"
              ])

          elif event_name == "issue_comment":
              issue = event.get("issue", {})
              comment = event.get("comment", {})
              is_pr = "pull_request" in issue
              kind = "PR COMMENT" if is_pr else "ISSUE COMMENT"

              thread_id = THREADS["reviews"] if THREADS["reviews"] else THREADS["issues"]

              msg = join_lines([
                  f"💬 <b>{kind}</b>",
                  f"📦 <b>{esc(repository)}</b>",
                  f'#{issue.get("number", "")} <a href="{esc(comment.get("html_url", repository_url))}"><b>{esc(issue.get("title", ""))}</b></a>',
                  f"👤 <b>{esc(actor)}</b>",
                  "",
                  esc(trim(comment.get("body", ""), 500))
              ])

          elif event_name == "pull_request_review":
              review = event.get("review", {})
              pr = event.get("pull_request", {})
              state = (review.get("state") or "").upper()

              thread_id = THREADS["reviews"] if THREADS["reviews"] else THREADS["prs"]

              msg = join_lines([
                  f"🧾 <b>PR REVIEW {esc(state)}</b>",
                  f"📦 <b>{esc(repository)}</b>",
                  f'#{pr.get("number", "")} <a href="{esc(pr.get("html_url", repository_url))}"><b>{esc(pr.get("title", ""))}</b></a>',
                  f"👤 <b>{esc(actor)}</b>",
                  "",
                  esc(trim(review.get("body", ""), 500)) if review.get("body") else ""
              ])

          elif event_name == "pull_request_review_comment":
              pr = event.get("pull_request", {})
              comment = event.get("comment", {})
              path = comment.get("path", "")
              line_no = comment.get("line") or comment.get("original_line") or ""

              thread_id = THREADS["reviews"] if THREADS["reviews"] else THREADS["prs"]

              file_line = f"📄 <code>{esc(path)}</code>"
              if line_no:
                  file_line += f":{line_no}"

              msg = join_lines([
                  "🗨 <b>PR REVIEW COMMENT</b>",
                  f"📦 <b>{esc(repository)}</b>",
                  f'#{pr.get("number", "")} <a href="{esc(comment.get("html_url", repository_url))}"><b>{esc(pr.get("title", ""))}</b></a>',
                  f"👤 <b>{esc(actor)}</b>",
                  file_line,
                  "",
                  esc(trim(comment.get("body", ""), 500))
              ])

          elif event_name == "release":
              release = event.get("release", {})
              action = event.get("action", "")
              name = release.get("name") or release.get("tag_name", "")
              url = release.get("html_url", repository_url)
              prerelease = release.get("prerelease", False)

              thread_id = THREADS["releases"]

              msg = join_lines([
                  f"🚀 <b>RELEASE {esc(action.upper())}</b>",
                  f"📦 <b>{esc(repository)}</b>",
                  f'🏷 <a href="{esc(url)}"><b>{esc(name)}</b></a>',
                  f"👤 <b>{esc(actor)}</b>",
                  f"🧪 prerelease: <b>{'yes' if prerelease else 'no'}</b>"
              ])

          elif event_name == "create":
              ref_type = event.get("ref_type", "")
              ref = event.get("ref", "")

              thread_id = THREADS["releases"]

              msg = join_lines([
                  f"✨ <b>{esc(ref_type.upper())} CREATED</b>",
                  f"📦 <b>{esc(repository)}</b>",
                  f"🔤 <code>{esc(ref)}</code>",
                  f"👤 <b>{esc(actor)}</b>"
              ])

          elif event_name == "delete":
              ref_type = event.get("ref_type", "")
              ref = event.get("ref", "")

              thread_id = THREADS["releases"]

              msg = join_lines([
                  f"🗑 <b>{esc(ref_type.upper())} DELETED</b>",
                  f"📦 <b>{esc(repository)}</b>",
                  f"🔤 <code>{esc(ref)}</code>",
                  f"👤 <b>{esc(actor)}</b>"
              ])

          elif event_name == "workflow_dispatch":
              thread_id = THREADS["releases"]

              msg = join_lines([
                  "🛠 <b>MANUAL RUN</b>",
                  f"📦 <b>{esc(repository)}</b>",
                  f"👤 <b>{esc(actor)}</b>",
                  f"🌿 <code>{esc(ref_name)}</code>",
                  f'🔗 <a href="{esc(repository_url)}/actions">actions tab</a>'
              ])

          else:
              thread_id = THREADS["releases"]

              msg = join_lines([
                  f"📣 <b>EVENT: {esc(event_name)}</b>",
                  f"📦 <b>{esc(repository)}</b>",
                  f"👤 <b>{esc(actor)}</b>",
                  f'🔗 <a href="{esc(repository_url)}">open repo</a>'
              ])

          msg = msg[:4000]

          with open(github_output, "a", encoding="utf-8") as out:
              out.write("text<<EOF\n")
              out.write(msg + "\n")
              out.write("EOF\n")
              out.write(f"thread_id={thread_id}\n")
          PY

      - name: Send to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          THREAD_ID: ${{ steps.build.outputs.thread_id }}
          TEXT: ${{ steps.build.outputs.text }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ] || [ -z "$TEXT" ]; then
            echo "Telegram secrets or text are missing"
            exit 1
          fi

          if [ -n "$THREAD_ID" ]; then
            curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${CHAT_ID}" \
              --data-urlencode "message_thread_id=${THREAD_ID}" \
              --data-urlencode "text=${TEXT}" \
              --data-urlencode "parse_mode=HTML" \
              --data-urlencode "disable_web_page_preview=true"
          else
            curl -sS -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${CHAT_ID}" \
              --data-urlencode "text=${TEXT}" \
              --data-urlencode "parse_mode=HTML" \
              --data-urlencode "disable_web_page_preview=true"
          fi