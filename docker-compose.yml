services:
  qdrant:
    image: qdrant/qdrant:v1.14.1
    ports:
      - "6333:6333"

  qdrant-init:
    image: curlimages/curl:8.12.1
    depends_on:
      - qdrant
    command:
      - sh
      - -c
      - |
        until curl -sf http://qdrant:6333/collections; do
          sleep 1
        done
        if curl -sf http://qdrant:6333/collections/evaluation >/dev/null; then
          exit 0
        fi
        curl -sf -X PUT http://qdrant:6333/collections/evaluation \
          -H 'Content-Type: application/json' \
          -d '{
            "vectors": {
              "dense": {
                "size": 1024,
                "distance": "Cosine"
              }
            },
            "sparse_vectors": {
              "sparse": {
                "modifier": "idf"
              }
            }
          }'
    restart: "no"

  index:
    build:
      context: ./index
    depends_on:
      - qdrant
    ports:
      - "8001:8000"

  search:
    build:
      context: ./search
    depends_on:
      qdrant-init:
        condition: service_completed_successfully
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: evaluation
      QDRANT_DENSE_VECTOR_NAME: dense
      QDRANT_SPARSE_VECTOR_NAME: sparse
      EMBEDDINGS_DENSE_URL: ${EMBEDDINGS_DENSE_URL:-http://83.166.249.64:18001/embeddings}
      RERANKER_URL: ${RERANKER_URL:-http://83.166.249.64:18001/score}
      OPEN_API_LOGIN: ${OPEN_API_LOGIN:?set OPEN_API_LOGIN before docker compose up}
      OPEN_API_PASSWORD: ${OPEN_API_PASSWORD:?set OPEN_API_PASSWORD before docker compose up}
      RERANK_ALPHA: ${RERANK_ALPHA:-0.3}
      MAX_DENSE_QUERIES: ${MAX_DENSE_QUERIES:-8}
      MAX_SPARSE_QUERIES: ${MAX_SPARSE_QUERIES:-8}
      DENSE_PREFETCH_K: ${DENSE_PREFETCH_K:-70}
      SPARSE_PREFETCH_K: ${SPARSE_PREFETCH_K:-45}
      RETRIEVE_K: ${RETRIEVE_K:-150}
      RERANK_LIMIT: ${RERANK_LIMIT:-20}
      UPSTREAM_CACHE_MAX_ITEMS: ${UPSTREAM_CACHE_MAX_ITEMS:-20000}
      UPSTREAM_MAX_RETRIES: ${UPSTREAM_MAX_RETRIES:-1}
      UPSTREAM_RETRY_DELAY_SECONDS: ${UPSTREAM_RETRY_DELAY_SECONDS:-0.25}
      INTENT_ALIGNMENT_WEIGHT: ${INTENT_ALIGNMENT_WEIGHT:-0.0}
    ports:
      - "8002:8000"
