services:
  qdrant:
    image: qdrant/qdrant:v1.14.1
    ports:
      - "6333:6333"

  qdrant-init:
    image: curlimages/curl:8.12.1
    depends_on:
      - qdrant
    environment:
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-messages}
      DENSE_VECTOR_SIZE: ${DENSE_VECTOR_SIZE:-384}
    command:
      - sh
      - -c
      - |
        until curl -sf http://qdrant:6333/collections; do
          sleep 1
        done
        if curl -sf "http://qdrant:6333/collections/$QDRANT_COLLECTION_NAME" >/dev/null; then
          exit 0
        fi
        curl -sf -X PUT "http://qdrant:6333/collections/$QDRANT_COLLECTION_NAME" \
          -H 'Content-Type: application/json' \
          -d '{
            "vectors": {
              "dense": {
                "size": '"$DENSE_VECTOR_SIZE"',
                "distance": "Cosine"
              }
            },
            "sparse_vectors": {
              "sparse": {
                "modifier": "idf"
              }
            }
          }'
    restart: "no"

  index:
    build:
      context: ./index
    depends_on:
      - qdrant
    environment:
      MAX_CHUNK_CHARS: ${MAX_CHUNK_CHARS:-1600}
      OVERLAP_MESSAGE_COUNT: ${OVERLAP_MESSAGE_COUNT:-2}
      MAX_TIME_GAP_SECONDS: ${MAX_TIME_GAP_SECONDS:-10800}
      LONG_MESSAGE_CHAR_THRESHOLD: ${LONG_MESSAGE_CHAR_THRESHOLD:-1400}
      LONG_MESSAGE_LINE_THRESHOLD: ${LONG_MESSAGE_LINE_THRESHOLD:-30}
      TECHNICAL_PREVIEW_LINES: ${TECHNICAL_PREVIEW_LINES:-18}
      TECHNICAL_PREVIEW_CHARS: ${TECHNICAL_PREVIEW_CHARS:-1800}
      SPLIT_MESSAGE_CHAR_THRESHOLD: ${SPLIT_MESSAGE_CHAR_THRESHOLD:-1200}
      SPLIT_SEGMENT_TARGET_CHARS: ${SPLIT_SEGMENT_TARGET_CHARS:-650}
    ports:
      - "8001:8000"

  search:
    build:
      context: ./search
    depends_on:
      qdrant-init:
        condition: service_completed_successfully
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-messages}
      QDRANT_DENSE_VECTOR_NAME: dense
      QDRANT_SPARSE_VECTOR_NAME: sparse
      DENSE_MODEL_NAME: ${DENSE_MODEL_NAME:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      DENSE_VECTOR_SIZE: ${DENSE_VECTOR_SIZE:-384}
      SPARSE_MODEL_NAME: ${SPARSE_MODEL_NAME:-Qdrant/bm25}
      FUSION_MODE: ${FUSION_MODE:-dbsf}
      MAX_DENSE_QUERIES: ${MAX_DENSE_QUERIES:-3}
      MAX_SPARSE_QUERIES: ${MAX_SPARSE_QUERIES:-3}
      DENSE_PREFETCH_K: ${DENSE_PREFETCH_K:-40}
      SPARSE_PREFETCH_K: ${SPARSE_PREFETCH_K:-40}
      RETRIEVE_K: ${RETRIEVE_K:-60}
    ports:
      - "8002:8000"
